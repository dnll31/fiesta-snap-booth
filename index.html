<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fiesta Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#EF476F; --yellow:#FFC93C; --blue:#118AB2; --green:#06D6A0; --sky:#06AED5;
    --ink:#2B2118; --paper:#FFFBF0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:'Poppins',sans-serif; display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
  }
  #bunting{width:100%; height:34px; display:flex;}
  #bunting div{flex:1; height:34px;
    clip-path:polygon(50% 100%,0 0,100% 0);
  }
  header{text-align:center; margin:18px 0 6px;}
  h1{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:clamp(28px,6vw,46px);
     margin:0; color:var(--pink); text-shadow:2px 2px 0 var(--yellow);}
  h2{font-family:'Baloo 2',sans-serif; font-weight:700; margin:4px 0 0; font-size:clamp(15px,3vw,20px); color:var(--blue);}
  #stage{position:relative; width:min(92vw,480px); aspect-ratio:4/3; background:#000;
    border-radius:18px; overflow:hidden; box-shadow:0 8px 0 var(--yellow),0 8px 24px rgba(0,0,0,.25); margin-top:14px;}
  video{width:100%; height:100%; object-fit:cover; transform:scaleX(-1);}
  #countdown{position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-family:'Baloo 2',sans-serif; font-size:120px; font-weight:800; color:#fff;
    text-shadow:0 0 20px rgba(0,0,0,.6); background:rgba(0,0,0,.15);}
  #flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;}
  .btnrow{display:flex; gap:12px; margin:18px 0; flex-wrap:wrap; justify-content:center;}
  button{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:18px; border:none;
    border-radius:999px; padding:14px 28px; cursor:pointer; color:#fff;
    box-shadow:0 4px 0 rgba(0,0,0,.2); transition:transform .1s;}
  button:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.2);}
  #startBtn{background:var(--pink);}
  #downloadBtn{background:var(--green); display:none;}
  #retakeBtn{background:var(--blue); display:none;}
  #kioskBtn{background:var(--sky); font-size:14px; padding:10px 18px;}
  #stripCanvas{display:none; margin:10px 0; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,.2); max-width:min(92vw,320px);}
  footer{margin:24px 0 40px; font-size:13px; color:#8a7d6b; text-align:center;}
</style>
</head>
<body>

<div id="bunting"></div>

<header>
  <h1>Kumusta, Fiesta!</h1>
  <h2>Everybody's Birthday &nbsp;•&nbsp; Jesus Generation Revival Fellowship</h2>
</header>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <div id="countdown">3</div>
  <div id="flash"></div>
</div>

<div class="btnrow">
  <button id="startBtn">📸 Start Photobooth</button>
  <button id="retakeBtn">🔁 Take Again</button>
  <button id="downloadBtn">⬇️ Download Strip</button>
</div>

<canvas id="stripCanvas"></canvas>

<div class="btnrow">
  <button id="kioskBtn">📟 Full-Screen Kiosk Mode</button>
</div>

<footer>Pinoy Fiesta Photobooth 🇵🇭 — runs entirely in your browser, no app or printer needed.</footer>

<script>
const COLORS = ['#EF476F','#FFC93C','#118AB2','#06D6A0','#06AED5'];
document.getElementById('bunting').innerHTML =
  Array.from({length:24}).map((_,i)=>`<div style="background:${COLORS[i%COLORS.length]}"></div>`).join('');

const video = document.getElementById('video');
const countdownEl = document.getElementById('countdown');
const flashEl = document.getElementById('flash');
const startBtn = document.getElementById('startBtn');
const retakeBtn = document.getElementById('retakeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const kioskBtn = document.getElementById('kioskBtn');
const stripCanvas = document.getElementById('stripCanvas');

let stream;
async function initCamera(){
  stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}, audio:false});
  video.srcObject = stream;
}
initCamera().catch(()=>alert('Please allow camera access to use the photobooth.'));

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function countIn(n){
  countdownEl.style.display='flex';
  for(let i=n;i>0;i--){ countdownEl.textContent=i; await sleep(700); }
  countdownEl.style.display='none';
}

function snap(){
  const c = document.createElement('canvas');
  c.width = video.videoWidth; c.height = video.videoHeight;
  const ctx = c.getContext('2d');
  ctx.translate(c.width,0); ctx.scale(-1,1); // mirror to match preview
  ctx.drawImage(video,0,0,c.width,c.height);
  flashEl.style.transition='none'; flashEl.style.opacity='1';
  requestAnimationFrame(()=>{
    flashEl.style.transition='opacity .4s';
    flashEl.style.opacity='0';
  });
  return c;
}

async function runPhotobooth(){
  startBtn.disabled = true;
  downloadBtn.style.display='none'; retakeBtn.style.display='none';
  stripCanvas.style.display='none';
  const shots = [];
  for(let i=0;i<4;i++){
    await countIn(3);
    shots.push(snap());
    await sleep(300);
  }
  buildStrip(shots);
  startBtn.disabled = false;
  downloadBtn.style.display='inline-block';
  retakeBtn.style.display='inline-block';
  stripCanvas.style.display='block';
}

function buildStrip(shots){
  const padding = 24, gap = 16, photoW = 480, photoH = 360;
  const headerH = 90, footerH = 70;
  stripCanvas.width = photoW + padding*2;
  stripCanvas.height = headerH + shots.length*photoH + (shots.length-1)*gap + footerH + padding;
  const ctx = stripCanvas.getContext('2d');

  ctx.fillStyle = '#FFFBF0';
  ctx.fillRect(0,0,stripCanvas.width, stripCanvas.height);

  // bunting header
  const triW = stripCanvas.width/12;
  for(let i=0;i<12;i++){
    ctx.fillStyle = COLORS[i%COLORS.length];
    ctx.beginPath();
    ctx.moveTo(i*triW,0); ctx.lineTo(i*triW+triW,0); ctx.lineTo(i*triW+triW/2,26);
    ctx.closePath(); ctx.fill();
  }

  ctx.fillStyle = '#EF476F';
  ctx.font = "700 34px 'Baloo 2', sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText('Kumusta, Fiesta!', stripCanvas.width/2, 68);

  let y = headerH;
  shots.forEach(s=>{
    ctx.drawImage(s, padding, y, photoW, photoH);
    ctx.strokeStyle = '#FFC93C'; ctx.lineWidth = 6;
    ctx.strokeRect(padding, y, photoW, photoH);
    y += photoH + gap;
  });

  ctx.fillStyle = '#118AB2';
  ctx.font = "600 20px 'Baloo 2', sans-serif";
  ctx.fillText("Everybody's Birthday", stripCanvas.width/2, y+30);
  ctx.font = "400 15px 'Poppins', sans-serif";
  ctx.fillStyle = '#2B2118';
  ctx.fillText('Jesus Generation Revival Fellowship 🇵🇭', stripCanvas.width/2, y+52);
}

startBtn.addEventListener('click', runPhotobooth);
retakeBtn.addEventListener('click', runPhotobooth);
downloadBtn.addEventListener('click', ()=>{
  const link = document.createElement('a');
  link.download = 'fiesta-photostrip.png';
  link.href = stripCanvas.toDataURL('image/png');
  link.click();
});
kioskBtn.addEventListener('click', ()=>{ document.documentElement.requestFullscreen?.(); });
</script>
</body>
</html>
